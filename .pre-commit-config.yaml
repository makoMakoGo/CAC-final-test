repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uvx ruff check
        language: system
        types_or: [python]
      - id: ruff-format
        name: Ruff format check
        entry: uvx ruff format --check
        language: system
        types_or: [python]
      - id: validate-questions
        name: Validate question metadata
        entry: uv run --no-project --with pyyaml==6.0.3 python scripts/validate_questions.py
        language: system
        pass_filenames: false
      - id: secret-scan
        name: Secret scan
        entry: make secret-scan
        language: system
        pass_filenames: false
