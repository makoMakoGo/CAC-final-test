[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "test-results",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
explicit_package_bases = true
strict = true
warn_unused_configs = true
