[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "test-results",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "FIX",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
explicit_package_bases = true
strict = true
warn_unused_configs = true

[tool.radon]
cc_min = "A"
cc_max = "C"
show_complexity = true
average = true
exclude = ".git,.venv,venv,__pycache__,test-results"

[tool.vulture]
paths = ["code", "code-fish", "scripts"]
min_confidence = 80
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "test-results",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["code-fish"]
addopts = [
    "--cov=code-fish/src",
    "--cov=code/src",
    "--cov-report=term-missing",
    "--cov-fail-under=10",
]

[tool.coverage.run]
branch = true
omit = [
    "*/__pycache__/*",
    "*/test-results/*",
]
